<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon {
    width: 512px;
    height: 512px;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(0,255,65,0.06) 0%, transparent 60%),
      radial-gradient(circle at 50% 50%, #080e08 0%, #040804 100%);
    border-radius: 96px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanlines */
  .icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 4px,
      rgba(0,0,0,0.12) 4px,
      rgba(0,0,0,0.12) 5px
    );
    border-radius: 96px;
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  .icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.5) 100%);
    border-radius: 96px;
    pointer-events: none;
    z-index: 11;
  }

  /* Border */
  .border {
    position: absolute;
    inset: 10px;
    border: 2px solid rgba(0,255,65,0.25);
    border-radius: 86px;
  }

  /* Inner border */
  .border-inner {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(0,255,65,0.1);
    border-radius: 76px;
  }

  /* Monogram */
  .monogram {
    font-family: 'JetBrains Mono', monospace;
    font-size: 180px;
    font-weight: 800;
    color: #00ff41;
    letter-spacing: 8px;
    text-shadow:
      0 0 40px rgba(0,255,65,0.5),
      0 0 80px rgba(0,255,65,0.2),
      0 2px 0 rgba(0,255,65,0.6);
    z-index: 5;
    margin-top: -10px;
  }

  /* Cursor block */
  .cursor {
    width: 24px;
    height: 36px;
    background: #00ff41;
    opacity: 0.7;
    margin-left: 6px;
    margin-top: 10px;
    box-shadow: 0 0 12px rgba(0,255,65,0.5);
    display: inline-block;
    z-index: 5;
  }

  .mono-row {
    display: flex;
    align-items: flex-end;
    z-index: 5;
  }

  /* Label */
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 800;
    color: rgba(0,255,65,0.3);
    letter-spacing: 10px;
    margin-top: 16px;
    z-index: 5;
    text-shadow: 0 0 15px rgba(0,255,65,0.15);
  }

  /* Top scanline accent */
  .scan-accent {
    position: absolute;
    top: 80px;
    left: 60px;
    right: 60px;
    height: 3px;
    background: rgba(0,255,65,0.06);
    border-radius: 2px;
  }

  /* Decorative dots */
  .dot-row {
    position: absolute;
    top: 54px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .dot-red { background: #ff5f56; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #27c93f; box-shadow: 0 0 6px #27c93f; }
</style>
</head>
<body>
  <div class="icon">
    <div class="border"></div>
    <div class="border-inner"></div>
    <div class="scan-accent"></div>

    <div class="dot-row">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>

    <div class="mono-row">
      <span class="monogram">TT</span>
      <span class="cursor"></span>
    </div>
    <div class="label">TERMINAL</div>
  </div>
</body>
</html>
